name: windows-build

# Compiles the Windows app on a real Windows runner — the build-verification loop
# for WinUI 3 code authored on macOS (which can't compile WinUI locally).
on:
  push:
    branches: [main]
    paths:
      - 'windows/**'
      - '!windows/**/*.md'
      - '.github/workflows/windows-build.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Add VS MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Test YtRec.Core
        run: dotnet test windows/YtRec.Core.Tests/YtRec.Core.Tests.csproj -c Release

      # WinUI 3 PRI/AppxPackage tasks live in VS MSBuild, not the bare .NET SDK,
      # so build the app with msbuild (/restore handles NuGet).
      - name: Build YtRec.App (WinUI 3, x64)
        run: msbuild windows/YtRec.App/YtRec.App.csproj /restore /p:Configuration=Release /p:Platform=x64

      # Portable, no-install build: self-contained (bundles .NET + Windows App SDK).
      - name: Publish portable (self-contained, no-install)
        run: msbuild windows/YtRec.App/YtRec.App.csproj /t:Publish /p:Configuration=Release /p:Platform=x64 /p:RuntimeIdentifier=win-x64 /p:SelfContained=true /p:WindowsAppSDKSelfContained=true

      - name: Zip portable build
        shell: pwsh
        run: |
          $pub = Get-ChildItem -Path windows/YtRec.App/bin -Recurse -Directory -Filter publish | Select-Object -First 1
          if (-not $pub) { throw "publish directory not found" }
          Write-Host "publish dir: $($pub.FullName)"
          Compress-Archive -Path "$($pub.FullName)/*" -DestinationPath YtRec-win-x64-portable.zip -Force
          Write-Host ("zip size: {0:N1} MB" -f ((Get-Item YtRec-win-x64-portable.zip).Length / 1MB))

      - uses: actions/upload-artifact@v4
        with:
          name: YtRec-win-x64-portable
          path: YtRec-win-x64-portable.zip
          if-no-files-found: error
